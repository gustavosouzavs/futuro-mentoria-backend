# Nginx configuration for Futuro Mentoria
# Domain: mentoria.futuroeducacional.com
# Frontend (Next.js) at / | Backend (AdonisJS) at /api
#
# Usage:
#   sudo ln -s /path/to/deploy/nginx.conf /etc/nginx/sites-available/mentoria.futuroeducacional.com
#   sudo ln -s /etc/nginx/sites-available/mentoria.futuroeducacional.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:3333;
}

server {
    listen 80;
    listen [::]:80;
    server_name mentoria.futuroeducacional.com;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # For initial setup without SSL, use the blocks below
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

